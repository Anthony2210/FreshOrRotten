project:
  name: FreshOrRotten

paths:
  raw_data_dir: data/raw
  processed_data_dir: data/processed
  model_dir: models
  figures_dir: reports/figures
  results_report: reports/results.md

data:
  image_size:
    width: 128
    height: 128
  labels:
    fresh: 0
    rotten: 1

training:
  batch_size: 32
  epochs: 20
  learning_rate: 0.001
  dropout_rate: 0.3
  validation_size: 0.2
  test_size: 0.2
  random_seed: 42
  early_stopping_patience: 5
  model_filename: baseline_model.keras
  history_filename: training_history.csv
  split_filename: standard_split.csv

generalization:
  unseen_categories: []
  unseen_model_filename: baseline_model_unseen.keras
  unseen_history_filename: unseen_training_history.csv
  unseen_split_filename: unseen_category_split.csv
  unseen_metrics_filename: unseen_category_evaluation_metrics.csv
  unseen_confusion_matrix_filename: unseen_category_confusion_matrix.csv
  unseen_category_metrics_filename: unseen_category_metrics_by_product_type.csv
  comparison_filename: evaluation_comparison.csv

uncertainty:
  target_accuracy: 0.95
  minimum_coverage: 0.50
  threshold_grid_start: 0.50
  threshold_grid_end: 0.99
  threshold_step: 0.01
  metrics_filename: uncertainty_metrics.csv
  calibration_grid_filename: uncertainty_calibration_grid.csv
  product_type_metrics_filename: uncertainty_by_product_type.csv

feature_distance_uncertainty:
  target_accuracy: 0.95
  minimum_coverage: 0.50
  feature_layer_index: -3
  metrics_filename: feature_distance_metrics.csv
  calibration_grid_filename: feature_distance_calibration_grid.csv
  product_type_metrics_filename: feature_distance_by_product_type.csv

web_app:
  confidence_thresholds:
    confident: 0.80
    uncertain: 0.60
